CONFIG_ZMK_KEYBOARD_NAME="Cenox"

# N-KRO
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# OLED Display
# CONFIG_ZMK_DISPLAY=y

# Deep sleep
CONFIG_ZMK_SLEEP=y

# Increase wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Debouncing (eager)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Macros
CONFIG_ZMK_MACRO_DEFAULT_TAP_MS=15
CONFIG_ZMK_MACRO_DEFAULT_WAIT_MS=15

# ZMK Studio
# CONFIG_ZMK_STUDIO=y
# CONFIG_ZMK_STUDIO_LOCKING=y
# CONFIG_ZMK_STUDIO_LOCK_IDLE_TIMEOUT_SEC=180
# CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=y

# USB Logging (this increases power usage by a significant amount)
# CONFIG_ZMK_USB_LOGGING=y
